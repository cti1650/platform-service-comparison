<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-SZ0XT7E1JT"></script>
  <script src="/js/ga.js"></script>
  <title>プラットフォームサービス比較</title>
  <script crossorigin src="https://unpkg.com/react@17/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@17/umd/react-dom.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
  <link href="https://use.fontawesome.com/releases/v6.2.0/css/all.css" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="./platforms/make.js"></script>
  <script src="./platforms/ifttt.js"></script>
  <script src="./platforms/zapier.js"></script>
  <script src="./platforms/powerAutomate.js"></script>
  <script src="./platforms/n8n.js"></script>
  <script src="./platforms/yoom.js"></script>
</head>

<body>
  <div id="root"></div>

  <script type="text/babel">
    // Web Workerのコード内のカテゴリーフィルター部分を変更
    const searchWorkerCode = `
      const hasSearchQueryKeyword = (text, query) => {
        if (!text) return false;
        const targetText = text.toLowerCase();
        const queryKeywords = query.split(" ");
        return queryKeywords.every(keyword=>{
          return targetText.includes(keyword)
        });
      };
      self.onmessage = function(e) {
        const { services, searchQuery, platformFilter, categoryFilter } = e.data;
        
        const filteredServices = services.filter(service => {
          // 1. カテゴリーフィルター（優先度1）
          if (categoryFilter !== 'view-all') { // view-allの場合はフィルタリングしない
            const platformCount = service.platforms.length;
            const totalPlatforms = 5;
            
            if (categoryFilter === 'all' && platformCount !== totalPlatforms) return false;
            if (categoryFilter === 'multiple' && (platformCount === 1 || platformCount === totalPlatforms)) return false;
            if (categoryFilter === 'unique' && platformCount !== 1) return false;
          }

          // 2. プラットフォームフィルター（優先度2）
          if (platformFilter && platformFilter !== 'all') {
            if (!service.platforms.includes(platformFilter)) return false;
          }
          
          // 3. 検索クエリフィルター（優先度3）
          if (searchQuery) {
            const query = searchQuery.toLowerCase();
            return service.platforms.some(platform => {
              const details = service.details[platform];
              const targetText = [details.title, details.description, details.tag].filter(Boolean).join('\\n');
              return hasSearchQueryKeyword(targetText, query);
            }) || hasSearchQueryKeyword(service.title, query);
          }
          
          return true;
        });
        
        // カテゴリー別の件数を計算
        const counts = {
          'view-all': 0,  // 追加
          all: 0,
          multiple: 0,
          unique: 0,
          platforms: {},
          totalUniqueServices: 0
        };
        
        // まずカテゴリーフィルターとプラットフォームフィルターのみを適用した結果で件数を計算
        const countedServices = services.filter(service => {
          // プラットフォームフィルターのみを適用
          if (platformFilter && platformFilter !== 'all') {
            if (!service.platforms.includes(platformFilter)) return false;
          }
          return true;
        });

        countedServices.forEach(service => {
          const platformCount = service.platforms.length;
          const totalPlatforms = 5;
          
          // すべてのサービスをカウント
          counts['view-all']++;
          
          if (platformCount === totalPlatforms) counts.all++;
          else if (platformCount === 1) counts.unique++;
          else counts.multiple++;
          
          // プラットフォーム別カウント
          service.platforms.forEach(platform => {
            counts.platforms[platform] = (counts.platforms[platform] || 0) + 1;
          });
        });

        // 重複を除いた総サービス数を計算
        counts.totalUniqueServices = countedServices.length;
        
        self.postMessage({
          services: filteredServices,
          counts
        });
      };
    `;

    const { useState, useMemo, useEffect, useCallback } = React;

    // サービスデータ
    const data = {
      zapier: zapierServices,
      IFTTT: iftttServices,
      'PowerAutomate': powerAutomateServices,
      n8n: n8nServices,
      make: makeServices,
      yoom: yoomServices
    };

    const formatedServiceTitle = (title) => {
      if (!title) return title;
      let replacedTitle = title;
      const replaceTitles = {
        'kintone': 'Kintone'
      };
      if (replaceTitles[title]) {
        replacedTitle = replaceTitles[title];
      }
      if (replacedTitle.endsWith(" (Independent Publisher)")) {
        replacedTitle = replacedTitle.replace(" (Independent Publisher)", "");
      }
      return replacedTitle;
    }

    // デバウンス関数
    const useDebounce = (value, delay) => {
      const [debouncedValue, setDebouncedValue] = useState(value);
      useEffect(() => {
        const handler = setTimeout(() => {
          setDebouncedValue(value);
        }, delay);
        return () => {
          clearTimeout(handler);
        };
      }, [value, delay]);
      return debouncedValue;
    };
    const SearchBar = ({ searchQuery, onSearchChange }) => (
      <div className="relative">
        <input
          type="text"
          placeholder="タイトル、説明文、タグで検索..."
          value={searchQuery}
          onChange={(e) => onSearchChange(e.target.value)}
          className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
        />
        <div className="absolute inset-y-0 right-0 flex items-center pr-3 pointer-events-none">
          <svg className="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
          </svg>
        </div>
      </div>
    );

    const CategoryButton = ({ category, active, count, onClick, children }) => (
      <button
        onClick={() => onClick(category)}
        className={`px-4 py-2 rounded-lg font-medium transition-colors whitespace-nowrap
                    ${active
            ? 'bg-blue-500 text-white'
            : 'bg-gray-100 hover:bg-gray-200 text-gray-700'
          }`}
      >
        {children} ({count})
      </button>
    );

    const PlatformButton = ({ platform, active, count, onClick }) => (
      <button
        onClick={() => onClick(platform)}
        className={`px-4 py-2 rounded-lg font-medium transition-colors whitespace-nowrap
          ${active
            ? 'bg-blue-500 text-white'
            : 'bg-gray-100 hover:bg-gray-200 text-gray-700'
          }`}
      >
        {platform} ({count})
      </button>
    );

    const PlatformBadge = ({ platform }) => (
      <span className="inline-block px-2 py-1 text-sm bg-blue-100 text-blue-700 rounded">
        {platform}
      </span>
    );

    const ServiceCard = ({ service }) => {
      const imgUrl = service.details[service.platforms[0]].icon;

      const handleGoogleSearch = () => {
        const searchQuery = encodeURIComponent(service.title);
        window.open(`https://www.google.com/search?q=${searchQuery}`, '_blank');
      };

      return (
        <div className="bg-white rounded-lg shadow-md overflow-hidden">
          <div className="p-4">
            <div className="flex justify-between items-start mb-3">
              <div>
                <h3 className="text-lg font-semibold flex items-center gap-2">
                  {imgUrl && <span className="max-w-[26px] max-h-[26px]"><img src={imgUrl} alt="image" /></span>}
                  <span>{service.title}</span>
                  <button
                    onClick={handleGoogleSearch}
                    className="p-1 hover:bg-gray-100 rounded-full transition-colors text-gray-500"
                    title="Googleで検索"
                  >
                    <i className="fa-solid fa-magnifying-glass"></i>
                  </button>
                </h3>
                <div className="flex gap-2 mt-2 flex-wrap">
                  {service.platforms.map(platform => (
                    <PlatformBadge key={platform} platform={platform} />
                  ))}
                </div>
              </div>
              <span className="text-sm text-gray-500">
                {service.count}プラットフォームで提供
              </span>
            </div>

            <div className="space-y-3">
              {service.platforms.map(platform => (
                <div key={platform} className="bg-gray-50 rounded p-3">
                  <h4 className="font-medium text-gray-700 mb-1">
                    <span>{platform}</span>
                    {service.details[platform].link && (
                      <a
                        href={service.details[platform].link}
                        target="_blank"
                        rel="noopener noreferrer"
                        className="p-1 text-xm text-blue-500 hover:underline"
                      >
                        <i class="fa-solid fa-up-right-from-square"></i>
                      </a>
                    )}
                  </h4>
                  <p className="text-sm text-gray-600 mb-2" translate="yes">
                    {service.details[platform].description}
                  </p>
                  {service.details[platform].tag && (
                    <div className="flex items-center gap-2">
                      <span className="px-2 py-1 bg-gray-200 text-gray-700 text-xs rounded">
                        {service.details[platform].tag}
                      </span>
                    </div>
                  )}
                </div>
              ))}
            </div>
          </div>
        </div>
      );
    };

    // ScrollTopButton コンポーネントを追加
    const ScrollTopButton = () => {
      const [isVisible, setIsVisible] = useState(false);

      // スクロール位置を監視
      useEffect(() => {
        const toggleVisibility = () => {
          if (window.pageYOffset > 300) {
            setIsVisible(true);
          } else {
            setIsVisible(false);
          }
        };

        window.addEventListener('scroll', toggleVisibility);

        return () => {
          window.removeEventListener('scroll', toggleVisibility);
        };
      }, []);

      // トップへスクロール
      const scrollToTop = () => {
        window.scrollTo({
          top: 0,
          behavior: 'smooth'
        });
      };

      return (
        <button
          className={`fixed right-6 bottom-6 p-3 rounded-full bg-blue-500 text-white shadow-lg transition-opacity duration-300 hover:bg-blue-600 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 ${isVisible ? 'opacity-100' : 'opacity-0 pointer-events-none'
            }`}
          onClick={scrollToTop}
          aria-label="トップへスクロール"
        >
          <svg
            className="w-6 h-6"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              strokeLinecap="round"
              strokeLinejoin="round"
              strokeWidth={2}
              d="M5 10l7-7m0 0l7 7m-7-7v18"
            />
          </svg>
        </button>
      );
    };

    const App = () => {
      const [selectedCategory, setSelectedCategory] = useState('all');
      const [selectedPlatform, setSelectedPlatform] = useState('all');
      const [searchInput, setSearchInput] = useState('');  // 入力用の状態
      const [filteredServices, setFilteredServices] = useState([]);
      const [counts, setCounts] = useState({
        all: 0,
        multiple: 0,
        unique: 0,
        platforms: {},
        totalUniqueServices: 0
      });

      // 検索クエリをデバウンス
      const debouncedSearchQuery = useDebounce(searchInput, 300);
      const worker = useMemo(() => {
        const w = new Worker(URL.createObjectURL(new Blob([searchWorkerCode], { type: 'text/javascript' })));

        w.onmessage = (e) => {
          const { services, counts } = e.data;
          setFilteredServices(services);
          setCounts(counts);
        };

        return w;
      }, []);

      const allServices = useMemo(() => {
        const platformNames = Object.keys(data);
        const serviceCounts = new Set();

        platformNames.forEach(platform => {
          data[platform].forEach(service => {
            const title = formatedServiceTitle(service.title)
            if (!serviceCounts[title]) {
              serviceCounts[title] = {
                count: 1,
                platforms: [platform],
                details: { [platform]: service }
              };
            } else {
              if (serviceCounts[title].platforms.includes(platform)) return;
              serviceCounts[title].count++;
              serviceCounts[title].platforms.push(platform);
              serviceCounts[title].details[platform] = service;
            }
          });
        });

        return Object.entries(serviceCounts).map(([title, info]) => ({
          title,
          ...info
        }));
      }, []);

      // 検索処理のデバウンスを適用
      useEffect(() => {
        worker.postMessage({
          services: allServices,
          searchQuery: debouncedSearchQuery,
          platformFilter: selectedPlatform,
          categoryFilter: selectedCategory
        });
      }, [debouncedSearchQuery, selectedPlatform, selectedCategory, allServices]);

      return (
        <div className="max-w-6xl mx-auto p-6" translate="no">
          <h1 className="text-2xl font-bold text-center mb-8">
            プラットフォーム間のサービス比較
          </h1>

          {/* カテゴリーフィルター */}
          <div className="mb-8">
            <div className="flex justify-center gap-4 overflow-x-auto pb-2">
              <CategoryButton
                category="view-all"
                active={selectedCategory === 'view-all'}
                count={counts['view-all']}
                onClick={setSelectedCategory}
              >
                すべて
              </CategoryButton>
              <CategoryButton
                category="all"
                active={selectedCategory === 'all'}
                count={counts.all}
                onClick={setSelectedCategory}
              >
                全プラットフォーム共通
              </CategoryButton>
              <CategoryButton
                category="multiple"
                active={selectedCategory === 'multiple'}
                count={counts.multiple}
                onClick={setSelectedCategory}
              >
                複数プラットフォーム
              </CategoryButton>
              <CategoryButton
                category="unique"
                active={selectedCategory === 'unique'}
                count={counts.unique}
                onClick={setSelectedCategory}
              >
                ユニーク
              </CategoryButton>
            </div>
          </div>

          {/* プラットフォームフィルター */}
          <div className="mb-8">
            <div className="flex flex-wrap gap-3 justify-center">
              <PlatformButton
                platform="all"
                active={selectedPlatform === 'all'}
                count={counts.totalUniqueServices}
                onClick={setSelectedPlatform}
              />
              {Object.keys(data).map(platform => (
                <PlatformButton
                  key={platform}
                  platform={platform}
                  active={selectedPlatform === platform}
                  count={counts.platforms[platform] || 0}
                  onClick={setSelectedPlatform}
                />
              ))}
            </div>
          </div>

          {/* 検索バー */}
          <div className="mb-8">
            <SearchBar
              searchQuery={searchInput}
              onSearchChange={setSearchInput}
            />
          </div>

          {filteredServices.length > 0 && (
            <div className="w-full flex justify-end mb-1">
              <div className="text-gray-500 text-sm">{filteredServices.length} 件{filteredServices.length > 2000 ? "中 2000件表示" : ""}</div>
            </div>
          )}

          {/* サービス一覧 */}
          <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
            {filteredServices.length > 0 ? (
              filteredServices.slice(0,2000).map(service => (
                <ServiceCard key={service.title} service={service} />
              ))
            ) : (
              <div className="col-span-full text-center text-gray-500 py-12">
                {debouncedSearchQuery
                  ? "検索条件に一致するサービスはありません"
                  : "該当するサービスはありません"}
              </div>
            )}
          </div>
          <ScrollTopButton />
        </div>
      );
    };

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>

</html>
