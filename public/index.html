  <script>
    window.PlatformDataLoader = {
      data: null,
      loaded: false,

      async loadFromJson() {
        try {
          const response = await fetch('./data.json');
          if (!response.ok) throw new Error('JSON not found');
          const json = await response.json();

          this.data = {
            zapier: json.platforms.zapier || [],
            IFTTT: json.platforms.ifttt || [],
            PowerAutomate: json.platforms.powerAutomate || [],
            n8n: json.platforms.n8n || [],
            make: json.platforms.make || [],
            yoom: json.platforms.yoom || [],
            dify: json.platforms.dify || [],
            anyflow: json.platforms.anyflow || []
          };
          this.loaded = true;
          console.log('Loaded data from JSON:', Object.keys(this.data).map(k => `${k}: ${this.data[k].length}`).join(', '));
          return this.data;
        } catch (e) {
          console.log('JSON not available, using legacy JS files');
          return null;
        }
      },

      getData() {
        if (this.loaded && this.data) {
          return this.data;
        }
        return {
          zapier: typeof zapierServices !== 'undefined' ? zapierServices : [],
          IFTTT: typeof iftttServices !== 'undefined' ? iftttServices : [],
          PowerAutomate: typeof powerAutomateServices !== 'undefined' ? powerAutomateServices : [],
          n8n: typeof n8nServices !== 'undefined' ? n8nServices : [],
          make: typeof makeServices !== 'undefined' ? makeServices : [],
          yoom: typeof yoomServices !== 'undefined' ? yoomServices : [],
          dify: typeof difyServices !== 'undefined' ? difyServices : [],
          anyflow: typeof anyflowServices !== 'undefined' ? anyflowServices : []
        };
      }
    };

<body>
  <div id="root"></div>

  <script type="text/babel">
    const searchWorkerCode = `
      const hasSearchQueryKeyword = (text, query) => {
        if (!text) return false;
        const targetText = text.toLowerCase();
        const queryKeywords = query.split(" ");
        return queryKeywords.every(keyword=>{
          return targetText.includes(keyword)
        });
      };
      self.onmessage = function(e) {
        const { services, searchQuery, platformFilter, categoryFilter, searchMode } = e.data;

        const filteredServices = services.filter(service => {
          if (categoryFilter !== 'view-all') {
            const platformCount = service.platforms.length;
            const totalPlatforms = 8;

            if (categoryFilter === 'all' && platformCount !== totalPlatforms) return false;
            if (categoryFilter === 'multiple' && platformCount < 2) return false;
            if (categoryFilter === 'unique' && platformCount !== 1) return false;
          }

          if (platformFilter && platformFilter !== 'all') {
            if (!service.platforms.includes(platformFilter)) return false;
          }

          if (searchQuery) {
            const query = searchQuery.toLowerCase();

            if (searchMode === 'title-only') {
              return hasSearchQueryKeyword(service.title, query);
            } else {
              return service.platforms.some(platform => {
                const details = service.details[platform];
                const targetText = [details.title, details.description, details.tag].filter(Boolean).join('\\n');
                return hasSearchQueryKeyword(targetText, query);
              }) || hasSearchQueryKeyword(service.title, query);
            }
          }

          return true;
        });

        const counts = {
          'view-all': 0,
          all: 0,
          multiple: 0,
          unique: 0,
          platforms: {},
          totalUniqueServices: 0
        };

        const searchFilteredServices = services.filter(service => {
          if (searchQuery) {
            const query = searchQuery.toLowerCase();

            if (searchMode === 'title-only') {
              return hasSearchQueryKeyword(service.title, query);
            } else {
              return service.platforms.some(platform => {
                const details = service.details[platform];
                const targetText = [details.title, details.description, details.tag].filter(Boolean).join('\\n');
                return hasSearchQueryKeyword(targetText, query);
              }) || hasSearchQueryKeyword(service.title, query);
            }
          }
          return true;
        });

        const categoryCountServices = searchFilteredServices.filter(service => {
          if (platformFilter && platformFilter !== 'all') {
            if (!service.platforms.includes(platformFilter)) return false;
          }
          return true;
        });

        categoryCountServices.forEach(service => {
          const platformCount = service.platforms.length;
          const totalPlatforms = 8;

          counts['view-all']++;

          if (platformCount === totalPlatforms) counts.all++;
          if (platformCount >= 2) counts.multiple++;
          if (platformCount === 1) counts.unique++;
        });

        const platformCountServices = searchFilteredServices.filter(service => {
          if (categoryFilter !== 'view-all') {
            const platformCount = service.platforms.length;
            const totalPlatforms = 8;

            if (categoryFilter === 'all' && platformCount !== totalPlatforms) return false;
            if (categoryFilter === 'multiple' && platformCount < 2) return false;
            if (categoryFilter === 'unique' && platformCount !== 1) return false;
          }
          return true;
        });

        platformCountServices.forEach(service => {
          service.platforms.forEach(platform => {
            counts.platforms[platform] = (counts.platforms[platform] || 0) + 1;
          });
        });

        counts.totalUniqueServices = platformCountServices.length;

        self.postMessage({
          services: filteredServices,
          counts
        });
      };
    `;

    const { useState, useMemo, useEffect, useCallback, useRef } = React;

    let data = window.PlatformDataLoader.getData();

    const formatedServiceTitle = (title) => {
      if (!title) return title;
      return window.ServiceNameNormalizer.normalizeServiceName(title);
    }

    const useDebounce = (value, delay) => {
      const [debouncedValue, setDebouncedValue] = useState(value);
      useEffect(() => {
        const handler = setTimeout(() => {
          setDebouncedValue(value);
        }, delay);
        return () => clearTimeout(handler);
      }, [value, delay]);
      return debouncedValue;
    };

    // ヘッダーコンポーネント

        </div>

    );

    // 検索バーコンポーネント
    const SearchBar = ({ searchQuery, onSearchChange, searchMode, onSearchModeChange }) => {
      const inputRef = useRef(null);

      const handleKeyDown = (e) => {
        if (e.key === 'Escape') {
          onSearchChange('');

      return (

            <div className="flex-shrink-0 pl-4 pr-2">

              </svg>
            </div>
            <input
              ref={inputRef}
              type="text"
              placeholder={searchMode === 'title-only' ? 'サービス名で検索...' : 'サービス名、説明文、タグで検索...'}
              value={searchQuery}
              onChange={(e) => onSearchChange(e.target.value)}
              onKeyDown={handleKeyDown}
              className="search-input flex-1 py-3 sm:py-4 px-2"
              autoComplete="off"
            />
            {searchQuery && (
              <button
                onClick={() => onSearchChange('')}
                className="flex-shrink-0 p-2 mr-2 text-gray-400 hover:text-gray-600 transition-colors rounded-full hover:bg-gray-100"
              >
                <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M6 18L18 6M6 6l12 12" />
                </svg>
              </button>
            )}
          </div>
          <div className="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-2 px-4 py-2 border-t border-gray-100">
            <div className="flex items-center gap-3">
              <label className="flex items-center gap-2 cursor-pointer group">
                <input
                  type="radio"
                  name="searchMode"
                  value="all"
                  checked={searchMode === 'all'}
                  onChange={(e) => onSearchModeChange(e.target.value)}
                  className="w-4 h-4 text-blue-600 focus:ring-blue-500"
                />
                <span className="text-sm text-gray-600 group-hover:text-gray-900">全体検索</span>
              </label>
              <label className="flex items-center gap-2 cursor-pointer group">
                <input
                  type="radio"
                  name="searchMode"
                  value="title-only"

                  className="w-4 h-4 text-blue-600 focus:ring-blue-500"

            {searchQuery && (
              <span className="text-sm text-blue-600 font-medium">
                「{searchQuery}」で検索中
              </span>
            )}
          </div>
        </div>
      );
    };

    // カテゴリーフィルターコンポーネント
    const CategoryFilter = ({ selectedCategory, setSelectedCategory, counts }) => {
      const categories = [
        { key: 'view-all', label: 'すべて', icon: '📋', description: 'すべてのサービス' },
        { key: 'all', label: '全共通', icon: '🎯', description: '8プラットフォーム共通' },
        { key: 'multiple', label: '複数', icon: '🔗', description: '2プラットフォーム以上' },
        { key: 'unique', label: 'ユニーク', icon: '💎', description: '1プラットフォーム限定' },
      ];

      return (
        <div className="filter-section p-4 sm:p-6">
          <div className="flex items-center justify-between mb-4">
            <h3 className="text-sm font-semibold text-gray-700 flex items-center gap-2">
              <span className="w-1 h-4 bg-blue-500 rounded-full"></span>
              カテゴリーフィルター
            </h3>
          </div>
          <div className="flex flex-wrap gap-2 sm:gap-3">
            {categories.map(cat => (
              <button
                key={cat.key}
                onClick={() => setSelectedCategory(cat.key)}
                className={`filter-chip ${selectedCategory === cat.key ? 'active' : ''}`}
                title={cat.description}
              >
                <span>{cat.icon}</span>
                <span className="hidden sm:inline">{cat.label}</span>
                <span className="count">{counts[cat.key] || 0}</span>
              </button>
            ))}
          </div>
        </div>
      );
    };

    // プラットフォームフィルターコンポーネント
    const PlatformFilter = ({ selectedPlatform, setSelectedPlatform, counts, platforms }) => {
      const platformConfig = {
        'zapier': { icon: '⚡', color: '#ff4a00' },
        'IFTTT': { icon: '🔗', color: '#000000' },
        'PowerAutomate': { icon: '🔄', color: '#0066ff' },
        'n8n': { icon: '🛠️', color: '#ea4b71' },
        'make': { icon: '🎯', color: '#6d4aff' },
        'yoom': { icon: '💫', color: '#00c4cc' },
        'dify': { icon: '🤖', color: '#1570ef' },
        'anyflow': { icon: '🔌', color: '#10b981' }
      };

      return (
        <div className="filter-section p-4 sm:p-6">
          <div className="flex items-center justify-between mb-4">
            <h3 className="text-sm font-semibold text-gray-700 flex items-center gap-2">
              <span className="w-1 h-4 bg-purple-500 rounded-full"></span>
              プラットフォームフィルター
            </h3>
            <span className="text-xs text-gray-500">{counts.totalUniqueServices || 0} 件</span>
          </div>
          <div className="flex flex-wrap gap-2">
            <button
              onClick={() => setSelectedPlatform('all')}
              className={`platform-chip ${selectedPlatform === 'all' ? 'active' : ''}`}
            >
              <span>🌐</span>
              <span>すべて</span>
            </button>
            {platforms.map(platform => (
              <button
                key={platform}
                onClick={() => setSelectedPlatform(platform)}
                className={`platform-chip ${selectedPlatform === platform ? 'active' : ''}`}
              >
                <span>{(platformConfig[platform] && platformConfig[platform].icon) || '📱'}</span>
                <span className="hidden sm:inline">{platform}</span>
                <span className="text-xs opacity-75">({counts.platforms[platform] || 0})</span>
              </button>
            ))}
          </div>
        </div>
      );
    };

    // プラットフォームバッジコンポーネント
    const PlatformBadge = ({ platform, service }) => {
      const handleClick = () => {
        const link = service.details[platform] && service.details[platform].link;
        if (link) window.open(link, '_blank');
      };

      const platformClass = platform.toLowerCase().replace(/\s+/g, '');

      return (
        <span
          className={`platform-badge ${platformClass}`}
          onClick={handleClick}
          title={(service.details[platform] && service.details[platform].link) ? `${platform}で開く` : platform}
        >
          {platform}
        </span>
      );
    };

    // サービスカードコンポーネント
    const ServiceCard = ({ service }) => {
      const [isExpanded, setIsExpanded] = useState(false);
      const firstPlatform = service.details[service.platforms[0]];
      const imgUrl = firstPlatform && firstPlatform.icon;

      const handleGoogleSearch = () => {
        window.open(`https://www.google.com/search?q=${encodeURIComponent(service.title)}`, '_blank');
      };

      return (
        <div className="service-card animate-fade-in">
          <div className="p-4 sm:p-6">
            {/* ヘッダー */}
            <div className="flex items-start gap-3 sm:gap-4 mb-4">
              {imgUrl && (
                <div className="flex-shrink-0 w-10 h-10 sm:w-12 sm:h-12 rounded-xl overflow-hidden bg-gray-50 p-1.5 border border-gray-100">
                  <img src={imgUrl} alt="" className="w-full h-full object-contain" loading="lazy" />
                </div>
              )}
              <div className="flex-1 min-w-0">
                <div className="flex items-start justify-between gap-2">
                  <h3 className="text-base sm:text-lg font-semibold text-gray-900 truncate">
                    {service.title}
                  </h3>
                  <button
                    onClick={handleGoogleSearch}
                    className="flex-shrink-0 p-1.5 text-gray-400 hover:text-gray-600 hover:bg-gray-100 rounded-lg transition-all"
                    title="Google検索"
                  >
                    <i className="fa-solid fa-magnifying-glass text-sm"></i>
                  </button>
                </div>
                <div className="flex items-center gap-2 mt-1 text-sm text-gray-500">
                  <span className="flex items-center gap-1">
                    <i className="fa-solid fa-layer-group text-xs"></i>
                    {service.count} プラットフォーム
                  </span>
                </div>
              </div>
            </div>

            {/* プラットフォームバッジ */}
            <div className="flex flex-wrap gap-1.5 mb-4">
              {service.platforms.map(platform => (
                <PlatformBadge key={platform} platform={platform} service={service} />
              ))}
            </div>

            {/* 詳細トグル */}
            <button
              onClick={() => setIsExpanded(!isExpanded)}
              className="w-full flex items-center justify-center gap-2 py-2 text-sm font-medium text-gray-600 hover:text-gray-900 hover:bg-gray-50 rounded-lg transition-all"
            >
              <span>{isExpanded ? '詳細を閉じる' : '詳細を見る'}</span>
              <i className={`fa-solid fa-chevron-${isExpanded ? 'up' : 'down'} text-xs transition-transform`}></i>
            </button>

            {/* 詳細パネル */}
            {isExpanded && (
              <div className="mt-4 space-y-3 animate-slide-up">
                {service.platforms.map(platform => (
                  <div key={platform} className="bg-gray-50 rounded-xl p-4 border border-gray-100">
                    <div className="flex items-center justify-between mb-2">
                      <h4 className="font-medium text-gray-800 text-sm">{platform}</h4>
                      {service.details[platform] && service.details[platform].link && (
                        <a
                          href={service.details[platform].link}
                          target="_blank"
                          rel="noopener noreferrer"
                          className="text-blue-500 hover:text-blue-700 text-xs"
                        >
                          <i className="fa-solid fa-external-link-alt"></i>
                        </a>
                      )}
                    </div>
                    {service.details[platform] && service.details[platform].title !== service.title && (
                      <p className="text-xs text-gray-500 mb-2">
                        別名: {service.details[platform].title}
                      </p>
                    )}
                    {service.details[platform] && service.details[platform].description && (
                      <p className="text-sm text-gray-600 leading-relaxed" translate="yes">
                        {service.details[platform].description}
                      </p>
                    )}
                    {service.details[platform] && service.details[platform].tag && (
                      <span className="inline-block mt-2 px-2 py-1 bg-white text-gray-600 text-xs rounded-full border border-gray-200">
                        🏷️ {service.details[platform].tag}
                      </span>
                    )}
                  </div>
                ))}
              </div>
            )}
          </div>
        </div>
      );
    };

    // 結果なしコンポーネント
    const NoResults = ({ searchQuery }) => (
      <div className="col-span-full">
        <div className="no-results-container text-center py-16 px-8">
          <div className="text-5xl mb-4">🔍</div>
          <h3 className="text-lg font-semibold text-gray-700 mb-2">
            {searchQuery ? '検索条件に一致するサービスがありません' : '該当するサービスがありません'}
          </h3>
          <p className="text-sm text-gray-500">
            フィルター条件を変更してお試しください
          </p>
        </div>
      </div>
    );

    // スクロールトップボタン
    const ScrollTopButton = () => {
      const [isVisible, setIsVisible] = useState(false);

      useEffect(() => {
        const toggleVisibility = () => {
          setIsVisible(window.pageYOffset > 400);
        };
        window.addEventListener('scroll', toggleVisibility);
        return () => window.removeEventListener('scroll', toggleVisibility);
      }, []);

      const scrollToTop = () => {
        window.scrollTo({ top: 0, behavior: 'smooth' });
      };

      if (!isVisible) return null;

      return (
        <button
          className="scroll-top-btn animate-fade-in"
          onClick={scrollToTop}
          aria-label="トップへ戻る"
        >
          <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M5 10l7-7m0 0l7 7m-7-7v18" />
          </svg>
        </button>
      );
    };

    // メインアプリ
    const App = () => {
      const [selectedCategory, setSelectedCategory] = useState('view-all');
      const [selectedPlatform, setSelectedPlatform] = useState('all');
      const [searchInput, setSearchInput] = useState('');
      const [searchMode, setSearchMode] = useState('all');
      const [filteredServices, setFilteredServices] = useState([]);
      const [isLoading, setIsLoading] = useState(true);
      const [counts, setCounts] = useState({
        'view-all': 0,
        all: 0,
        multiple: 0,
        unique: 0,
        platforms: {},
        totalUniqueServices: 0
      });

      const debouncedSearchQuery = useDebounce(searchInput, 300);

      const worker = useMemo(() => {
        const w = new Worker(URL.createObjectURL(new Blob([searchWorkerCode], { type: 'text/javascript' })));
        w.onmessage = (e) => {
          setFilteredServices(e.data.services);
          setCounts(e.data.counts);
          setIsLoading(false);
        };
        return w;
      }, []);

      const allServices = useMemo(() => {
        const platformNames = Object.keys(data);
        const serviceCounts = {};

        platformNames.forEach(platform => {
          data[platform].forEach(service => {
            const title = formatedServiceTitle(service.title);
            if (!serviceCounts[title]) {
              serviceCounts[title] = {
                count: 1,
                platforms: [platform],
                details: { [platform]: service }
              };
            } else {
              if (serviceCounts[title].platforms.includes(platform)) return;
              serviceCounts[title].count++;
              serviceCounts[title].platforms.push(platform);
              serviceCounts[title].details[platform] = service;
            }
          });
        });

        return Object.entries(serviceCounts).map(([title, info]) => ({
          title,
          ...info
        }));
      }, []);

      const totalServices = useMemo(() => {
        return Object.values(data).reduce((sum, arr) => sum + arr.length, 0);
      }, []);

      useEffect(() => {
        setIsLoading(true);
        worker.postMessage({
          services: allServices,
          searchQuery: debouncedSearchQuery,
          platformFilter: selectedPlatform,
          categoryFilter: selectedCategory,
          searchMode: searchMode
        });
      }, [debouncedSearchQuery, selectedPlatform, selectedCategory, searchMode, allServices]);

      const platforms = Object.keys(data);

      return (
        <div className="min-h-screen" translate="no">
          <Header totalServices={totalServices} />

          <main className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 -mt-6 sm:-mt-8 relative z-10 pb-12">
            {/* 検索セクション */}
            <div className="mb-6">
              <SearchBar
                searchQuery={searchInput}
                onSearchChange={setSearchInput}
                searchMode={searchMode}
                onSearchModeChange={setSearchMode}
              />
            </div>

            {/* フィルターセクション */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-4 mb-6">
              <CategoryFilter
                selectedCategory={selectedCategory}
                setSelectedCategory={setSelectedCategory}
                counts={counts}
              />
              <PlatformFilter
                selectedPlatform={selectedPlatform}
                setSelectedPlatform={setSelectedPlatform}
                counts={counts}
                platforms={platforms}
              />
            </div>

            {/* 結果ヘッダー */}
            <div className="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3 mb-6">
              <div className="flex items-center gap-3">
                {isLoading && <div className="loading-spinner"></div>}
                <span className="text-sm text-gray-600">
                  {isLoading ? '検索中...' : `${filteredServices.length.toLocaleString()} 件のサービス`}
                </span>
              </div>
              {filteredServices.length > 2000 && (
                <span className="text-xs text-amber-600 bg-amber-50 px-3 py-1 rounded-full">
                  ※ 表示は2,000件まで
                </span>
              )}
            </div>

            {/* サービスグリッド */}
            <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4 sm:gap-6">
              {filteredServices.length > 0 ? (
                filteredServices.slice(0, 2000).map(service => (
                  <ServiceCard key={service.title} service={service} />
                ))
              ) : (
                !isLoading && <NoResults searchQuery={debouncedSearchQuery} />
              )}
            </div>
          </main>

          <ScrollTopButton />

          {/* フッター */}
          <footer className="bg-gray-900 text-gray-400 py-8 mt-12">
            <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center text-sm">
              <p>iPaaS連携サービス比較ツール</p>
              <p className="mt-1 text-gray-500">Zapier, IFTTT, Make, Power Automate, n8n, Yoom, Dify, Anyflow</p>
            </div>
          </footer>
        </div>
      );
    };

    // アプリ起動
    (async () => {
      const jsonData = await window.PlatformDataLoader.loadFromJson();
      if (jsonData) {
        data = jsonData;
      }
      ReactDOM.render(<App />, document.getElementById('root'));
    })();
  </script>
</body>

</html>
