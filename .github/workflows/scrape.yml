name: Scrape iPaaS Services

on:
  schedule:
    # 毎週日曜日の午前3時（JST）に実行
    - cron: '0 18 * * 0'
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to scrape (all for all platforms)'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - zapier
          - ifttt
          - make
          - powerAutomate
          - n8n
          - yoom
          - dify
          - anyflow

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium

      - name: Initialize database
        run: npm run db:init

      - name: Run scraper (all platforms)
        if: ${{ github.event.inputs.platform == 'all' || github.event_name == 'schedule' }}
        run: npm run scrape

      - name: Run scraper (single platform)
        if: ${{ github.event.inputs.platform != 'all' && github.event_name != 'schedule' }}
        run: npm run scrape:${{ github.event.inputs.platform }}

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          # SQLiteの件数を取得
          TOTAL=$(sqlite3 public/services.db "SELECT COUNT(*) FROM services")
          NORMALIZED=$(sqlite3 public/services.db "SELECT COUNT(DISTINCT title) FROM normalized_services")
          echo "Total services: $TOTAL, Normalized: $NORMALIZED"

          # データベースをコミット
          git add public/services.db

          # 変更がある場合のみコミット
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update scraped data $(date +'%Y-%m-%d') [$TOTAL services, $NORMALIZED normalized]"
            git push
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: scrape-results
          path: public/services.db
          retention-days: 7
